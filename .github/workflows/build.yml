name: Build MeiamSubtitles

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release --no-restore

      - name: Upload Emby.Shooter DLL
        uses: actions/upload-artifact@v4
        with:
          name: Emby.MeiamSub.Shooter
          path: Release/netstandard2.1/Emby.MeiamSub.Shooter.dll

      - name: Upload Emby.Thunder DLL
        uses: actions/upload-artifact@v4
        with:
          name: Emby.MeiamSub.Thunder
          path: Release/netstandard2.1/Emby.MeiamSub.Thunder.dll

      - name: Upload Jellyfin.Shooter DLL
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.MeiamSub.Shooter
          path: Release/net9.0/Jellyfin.MeiamSub.Shooter.dll

      - name: Upload Jellyfin.Thunder DLL
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.MeiamSub.Thunder
          path: Release/net9.0/Jellyfin.MeiamSub.Thunder.dll

      - name: Upload Emby.SubHD DLL
        uses: actions/upload-artifact@v4
        with:
          name: Emby.MeiamSub.SubHD
          path: Release/netstandard2.1/Emby.MeiamSub.SubHD.dll

      - name: Upload Emby.Zimuku DLL
        uses: actions/upload-artifact@v4
        with:
          name: Emby.MeiamSub.Zimuku
          path: Release/netstandard2.1/Emby.MeiamSub.Zimuku.dll

      - name: Upload Jellyfin.SubHD DLL
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.MeiamSub.SubHD
          path: Release/net9.0/Jellyfin.MeiamSub.SubHD.dll

      - name: Upload Jellyfin.Zimuku DLL
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.MeiamSub.Zimuku
          path: Release/net9.0/Jellyfin.MeiamSub.Zimuku.dll
